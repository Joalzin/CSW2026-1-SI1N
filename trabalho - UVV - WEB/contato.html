<head>

</head>

<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="curriculo.html">Currículo</a></li>
            <li><a href="servicos.html">Serviços</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

    <section id="contato">
        <h1>Entre em Contato</h1>
        <p>Preencha o formulário abaixo para solicitar um orçamento ou tirar dúvidas sobre o desenvolvimento do seu
            site.</p>

        <form action="#" method="post">
            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required><br><br>

            <label for="telefone">Telefone:</label><br>
            <input type="tel" id="telefone" name="telefone" placeholder="(27) 99999-9999" required><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required><br><br>

            <p>Tipo de cliente:</p>
            <input type="radio" id="pf" name="tipo_pessoa" value="PF">
            <label for="pf">Pessoa Física</label>
            <input type="radio" id="pj" name="tipo_pessoa" value="PJ">
            <label for="pj">Pessoa Jurídica</label><br><br>
            


            <label for="horario">Melhor horário para contato:</label><br>
            <select id="horario" name="horario">
                <option value="manha">Manhã</option>
                <option value="tarde">Tarde</option>
                <option value="noite">Noite</option>
            </select><br><br>

            <p>Tipo de serviço que deseja:</p>
            <label for="estatico">Site Estático</label><br>
            <input type="checkbox" id="estatico" name="servico" value="estatico">
            <label for="dinamico">Site Dinâmico</label><br>
            <input type="checkbox" id="dinamico" name="servico" value="dinamico">
            <label for="avancado">Site Super Avançado</label><br><br>
            <input type="checkbox" id="avancado" name="servico" value="avancado">

            <label for="descricao">Breve descrição do que deseja contratar:</label><br>
            <textarea id="descricao" name="descricao" rows="5" cols="40"
                placeholder="Descreva seu projeto aqui..."></textarea><br><br>

            <button type="submit">Enviar Proposta</button>
        </form>
    </section>
</body>

</html>
